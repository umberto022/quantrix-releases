name: quantrix
description: Market analysis app with combined technical, fundamental and sentiment signals.
publish_to: 'none'
version: 1.0.0+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.4.9

  # HTTP & APIs
  dio: ^5.4.0

  # Charts
  fl_chart: ^0.66.2

  # Local storage
  hive_flutter: ^1.1.0

  # UI
  google_fonts: ^6.1.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1

  # Firebase
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.4
  cloud_firestore: ^5.2.1

  # Network
  connectivity_plus: ^6.0.3

  # Utils
  intl: ^0.19.0
  shared_preferences: ^2.2.2
  package_info_plus: ^8.0.0
  url_launcher: ^6.3.0
  open_file: ^3.3.2
  permission_handler: ^11.3.1
  path_provider: ^2.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.7
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icon.png"
  min_sdk_android: 21
  web:
    generate: false

flutter_native_splash:
  color: "#0D1117"
  image: assets/images/icon.png
  color_dark: "#0D1117"
  image_dark: assets/images/icon.png
  android_12:
    image: assets/images/icon.png
    color: "#0D1117"
  fullscreen: true

flutter:
  uses-material-design: true
  assets:
    - assets/images/
